name: Release - build and attach firmware

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup ESP-IDF
        uses: espressif/esp-idf-action@v2
        with:
          esp-idf-version: 'v5.0'

      - name: Build project
        run: idf.py build

      - name: Create GitHub release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}

      - name: Upload firmware assets to release
        uses: softprops/action-gh-release@v1
        with:
          files: build/*.bin
